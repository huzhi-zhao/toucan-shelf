services:
  toucan-shelf:
    build:
      context: .
      dockerfile: Dockerfile
    image: toucan-shelf:local
    container_name: toucan-shelf
    restart: unless-stopped
    volumes:
      - memos-data:/var/opt/memos
    ports:
      - "${MEMOS_PORT:-5230}:5230"
    environment:
      - TZ=${TZ:-UTC}

volumes:
  memos-data:
