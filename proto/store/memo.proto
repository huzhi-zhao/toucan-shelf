syntax = "proto3";

package memos.store;

option go_package = "gen/store";

message MemoPayload {
  Property property = 1;

  Location location = 2;

  repeated string tags = 3;

  // Set when this memo is a comment anchored to a location within a PDF attachment.
  PdfAnnotation pdf_annotation = 4;

  // Set when this memo is a comment anchored to a heading within a document memo.
  DocAnchor doc_anchor = 5;

  // Supplementary per-node data keyed by an in-document node anchor id (e.g. a
  // `sheets` block's `id:`). The value is an opaque JSON string whose shape is
  // owned by the node's renderer; the server never parses it. Lets clients
  // attach overlay info (cell styles, etc.) to any addressable node without
  // touching that node's raw content.
  map<string, string> node_overlays = 6;

  // Set when this memo is a comment anchored to a text range within an EPUB attachment.
  EpubAnnotation epub_annotation = 7;

  // The calculated properties from the memo content.
  message Property {
    bool has_link = 1;
    bool has_task_list = 2;
    bool has_code = 3;
    bool has_incomplete_tasks = 4;
    // The title extracted from the first H1 heading, if present.
    string title = 5;
  }

  message Location {
    string placeholder = 1;
    double latitude = 2;
    double longitude = 3;
  }

  message PdfAnnotation {
    // The name of the attachment this annotation is anchored to, e.g. "attachments/{uid}".
    string attachment_name = 1;
    // 1-based page number.
    int32 page = 2;
    // Normalized (0~1) rect relative to the unrotated page dimensions.
    double x = 3;
    double y = 4;
    double width = 5;
    double height = 6;
    // Optional selected text snippet, used as a fallback anchor if the rect drifts.
    string text_snippet = 7;
  }

  message DocAnchor {
    // The slug (DOM id) of the heading this comment is anchored to. Empty means the
    // comment is anchored to the top of the document (no preceding heading).
    string heading_slug = 1;
    // The heading's display text, shown as the comment's anchor label.
    string heading_text = 2;
  }

  message EpubAnnotation {
    // The name of the attachment this annotation is anchored to, e.g. "attachments/{uid}".
    string attachment_name = 1;
    // The EPUB CFI range identifying the highlighted text span.
    string cfi_range = 2;
    // Optional selected text snippet, shown as the comment's anchor label and used as
    // a fallback if the CFI range can't be resolved.
    string text_snippet = 3;
    // The mark's color, as a preset key (e.g. "yellow", "blue"). Empty means the default.
    string color = 4;
    // When true the mark renders as an underline in `color`; otherwise as a background highlight.
    bool underline = 5;
  }
}
